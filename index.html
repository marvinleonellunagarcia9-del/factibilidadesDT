<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema GUATEL Definitivo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .tabs { display: flex; border-bottom: 2px solid #004a99; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #ddd; margin-right: 5px; }
        .tab-btn.active { background: #004a99; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        input[type="text"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; border: 1px solid #eee; margin-top: 10px; }
        .btn-gen { background: #2ecc71; color: white; width: 100%; padding: 15px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('generador')">Generador</button>
        <button class="tab-btn" onclick="showTab('informes')">Historial Sincronizado</button>
    </div>

    <div id="generador" class="tab-content active">
        <h2>Generar Factibilidad GUATEL</h2>
        <form id="gen-form">
            <div class="form-group">
                <label>Tipo de Factibilidad:</label>
                <div class="checkbox-group" id="lista-tipos">
                    <label><input type="checkbox" value="Internet Corporativo"> Internet Corporativo</label>
                    <label><input type="checkbox" value="Enlace de datos"> Enlace de datos</label>
                    <label><input type="checkbox" value="Enlace de fibra oscura"> Enlace de fibra oscura</label>
                    <label><input type="checkbox" value="Cableado Estructurado"> Cableado Estructurado</label>
                    <label><input type="checkbox" value="Planta Telefónica IP"> Planta Telefónica IP</label>
                    <label><input type="checkbox" value="Línea E1 Dedicada"> Línea E1 Dedicada</label>
                    <label><input type="checkbox" value="Línea SIP Trunking"> Línea SIP Trunking</label>
                    <label><input type="checkbox" value="Apps"> Aplicaciones de Software</label>
                    <label><input type="checkbox" value="Hosting"> Hosting</label>
                    <label><input type="checkbox" value="Cámaras de Vigilancia"> Cámaras de Vigilancia</label>
                    <label><input type="checkbox" value="Virtualización"> Virtualización</label>
                    <label><input type="checkbox" value="Colocation"> Colocation (Centro de Datos)</label>
                    <label><input type="checkbox" value="Servicio Satelital"> Servicio Satelital Empresarial</label>
                    <label><input type="checkbox" value="Gestor Documental"> Gestor Documental (BPM)</label>
                    <label><input type="checkbox" value="Arrendamiento"> Arrendamiento de Equipos</label>
                    <label><input type="checkbox" value="Consultoría"> Consultoría e Informática</label>
                    <label><input type="checkbox" value="Servicios Admin"> Servicios Administrativos</label>
                    <label><input type="checkbox" id="chk-otro" value="Otro"> Otro:</label>
                </div>
                <input type="text" id="input-otro" style="display:none; margin-top:10px;" placeholder="Especifique otro servicio...">
            </div>
            <div class="form-group"><label>Cliente:</label><input type="text" id="cliente" required></div>
            <div class="form-group"><label>Escalabilidad:</label><select id="escalabilidad"><option>Baja</option><option>Media</option><option>Alta</option><option>Urgente</option></select></div>
            <div class="form-group"><label>Responsable:</label><input type="text" id="resp" value="Marvin Luna" required></div>
            <div class="form-group"><label>Conclusiones:</label><textarea id="conclusiones" rows="4" required></textarea></div>
            <button type="submit" class="btn-gen">Generar Documento y Sincronizar</button>
        </form>
    </div>

    <div id="informes" class="tab-content">
        <h2>Historial de Informes</h2>
        <table><thead><tr><th>No.</th><th>Cliente</th><th>Fecha</th><th>Servicios</th></tr></thead><tbody id="historial-body"></tbody></table>
    </div>
</div>

<script>
    // --- PEGA AQUÍ TU CONFIGURACIÓN DE FIREBASE ---
    const firebaseConfig = {
  apiKey: "AIzaSyAgfgtYlSgZUGRDeI50i_Nmfe5HAJdFKWQ",
  authDomain: "factibilidadeseinformes.firebaseapp.com",
  projectId: "factibilidadeseinformes",
  storageBucket: "factibilidadeseinformes.firebasestorage.app",
  messagingSenderId: "174539826691",
  appId: "1:174539826691:web:418edf70607e41fda41036"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Sincronización Real Time
    db.collection("factibilidades").orderBy("timestamp", "desc").onSnapshot(snapshot => {
        const body = document.getElementById('historial-body');
        body.innerHTML = "";
        snapshot.forEach(doc => {
            const h = doc.data();
            body.innerHTML += `<tr><td>${h.corr}</td><td>${h.cliente}</td><td>${h.fecha}</td><td>${h.tipos}</td></tr>`;
        });
    });

    document.getElementById('chk-otro').addEventListener('change', function() {
        document.getElementById('input-otro').style.display = this.checked ? 'block' : 'none';
    });

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    document.getElementById('gen-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.innerText = "Procesando...";

        // Obtener último correlativo
        const query = await db.collection("factibilidades").orderBy("corr", "desc").limit(1).get();
        let nuevoCorr = 995;
        if(!query.empty) {
            let ultimo = parseInt(query.docs[0].data().corr);
            nuevoCorr = (ultimo >= 999) ? 1 : ultimo + 1;
        }

        let sel = [];
        document.querySelectorAll('#lista-tipos input[type="checkbox"]:checked').forEach(c => {
            sel.push(c.value === "Otro" ? document.getElementById('input-otro').value : c.value);
        });

        const data = {
            corr: String(nuevoCorr).padStart(3, '0'),
            tipos: sel.join(", "),
            cliente: document.getElementById('cliente').value,
            escala: document.getElementById('escalabilidad').value,
            resp: document.getElementById('resp').value,
            concl: document.getElementById('conclusiones').value,
            fecha: new Date().toLocaleDateString('es-GT'),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection("factibilidades").add(data);

        // Word (Formato Guatel)
        const docHTML = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <body style="font-family: Arial, sans-serif; padding: 40px;">
            <h1 style="text-align: center; border-bottom: 2px solid #000;">INFORME DE FACTIBILIDAD TÉCNICA</h1>
            <table style="width:100%; border-collapse:collapse; margin-top:20px;">
                <tr><td style="border:1px solid #000; padding:10px;"><strong>No. Correlativo:</strong></td><td style="border:1px solid #000; padding:10px;">${data.corr}</td></tr>
                <tr><td style="border:1px solid #000; padding:10px;"><strong>Cliente:</strong></td><td style="border:1px solid #000; padding:10px;">${data.cliente}</td></tr>
                <tr><td style="border:1px solid #000; padding:10px;"><strong>Servicios:</strong></td><td style="border:1px solid #000; padding:10px;">${data.tipos}</td></tr>
                <tr><td style="border:1px solid #000; padding:10px;"><strong>Escalabilidad:</strong></td><td style="border:1px solid #000; padding:10px;">${data.escala}</td></tr>
            </table>
            <h2 style="margin-top:30px;">Conclusiones</h2>
            <div style="border:1px solid #000; padding:15px; min-height:100px;">${data.concl}</div>
            <div style="margin-top:60px; display:flex; justify-content:space-between;">
                <div style="text-align:center;">__________________________<br>Firma Responsable</div>
                <div style="text-align:center;">__________________________<br>Vo. Bo.</div>
            </div></body></html>`;

        const blob = new Blob(['\ufeff', docHTML], { type: 'application/msword' });
        saveAs(blob, "Factibilidad_" + data.corr + ".doc");
        
        btn.innerText = "Generar Documento y Sincronizar";
        document.getElementById('gen-form').reset();
        alert("¡Informe generado y sincronizado!");
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Factibilidades</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #e9ecef;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            font-weight: bold;
            color: #495057;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], select, input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .note {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 5px;
        }
    </style>
    <!-- Librerías necesarias para generar Word -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.11/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip-utils.js"></script>
</head>
<body>

<div class="container">
    <h2>Formulario de Factibilidad</h2>
    
    <div class="header-info">
        <span>Documento de Factibilidad</span>
        <span id="display-correlativo">Correlativo: Cargando...</span>
    </div>

    <form id="factibilidad-form">
        <div class="form-group">
            <label for="template-file">1. Sube tu plantilla Word (.docx o .docm) preparada con etiquetas:</label>
            <input type="file" id="template-file" accept=".docx, .docm" required>
            <div class="note">Asegúrate de que tu Word tenga escrito {correlativo}, {tipo_factibilidad}, y {cliente}.</div>
        </div>

        <div class="form-group">
            <label for="tipo_factibilidad">Tipo de Factibilidad:</label>
            <select id="tipo_factibilidad" required>
                <option value="">Seleccione una opción</option>
                <option value="Técnica">Técnica</option>
                <option value="Operativa">Operativa</option>
                <option value="Económica">Económica</option>
            </select>
        </div>

        <div class="form-group">
            <label for="cliente">Nombre del Cliente:</label>
            <input type="text" id="cliente" placeholder="Ej. Empresa S.A." required>
        </div>

        <!-- Agrega aquí los "otros datos más" -->
        <div class="form-group">
            <label for="otro_dato">Otro Dato Adicional (Ejemplo):</label>
            <input type="text" id="otro_dato" placeholder="Dato extra para el documento">
        </div>

        <button type="submit">Generar Documento Word</button>
    </form>
</div>

<script>
    // Manejo del Correlativo Automático (Ejemplo con LocalStorage)
    // Para un entorno multiusuario, esto se puede reemplazar con una llamada a Firebase Firestore/Realtime Database.
    let correlativoActual = localStorage.getItem('correlativo_factibilidad');
    if (!correlativoActual) {
        correlativoActual = 1;
    } else {
        correlativoActual = parseInt(correlativoActual);
    }
    
    // Formatear correlativo (Ej: FAC-2026-0001)
    const year = new Date().getFullYear();
    let numeroFormateado = "FAC-" + year + "-" + String(correlativoActual).padStart(4, '0');
    document.getElementById('display-correlativo').innerText = "Correlativo: " + numeroFormateado;

    document.getElementById('factibilidad-form').addEventListener('submit', function(event) {
        event.preventDefault();

        const fileInput = document.getElementById('template-file');
        if (fileInput.files.length === 0) {
            alert("Por favor sube la plantilla de Word primero.");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            
            try {
                // Iniciar PizZip con el contenido del archivo
                const zip = new PizZip(content);
                const doc = new window.docxtemplater(zip, {
                    paragraphLoop: true,
                    linebreaks: true,
                });

                // Recolectar datos del formulario
                const tipoFactibilidad = document.getElementById('tipo_factibilidad').value;
                const cliente = document.getElementById('cliente').value;
                const otroDato = document.getElementById('otro_dato').value;

                // Renderizar el documento reemplazando las etiquetas
                doc.render({
                    correlativo: numeroFormateado,
                    tipo_factibilidad: tipoFactibilidad,
                    cliente: cliente,
                    otro_dato: otroDato
                });

                // Generar el archivo final
                const out = doc.getZip().generate({
                    type: "blob",
                    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                });
                
                // Guardar el documento generado con el nombre del cliente y correlativo
                saveAs(out, "Factibilidad_" + cliente.replace(/\s+/g, '_') + "_" + numeroFormateado + ".docx");

                // Aumentar el correlativo para el siguiente formulario
                correlativoActual++;
                localStorage.setItem('correlativo_factibilidad', correlativoActual);
                
                // Actualizar la vista
                numeroFormateado = "FAC-" + year + "-" + String(correlativoActual).padStart(4, '0');
                document.getElementById('display-correlativo').innerText = "Correlativo: " + numeroFormateado;
                
                alert("¡Documento generado con éxito!");
                document.getElementById('factibilidad-form').reset();

            } catch (error) {
                console.error(error);
                alert("Hubo un error al generar el documento. Asegúrate de que las etiquetas en el Word sean correctas.");
            }
        };

        // Leer el archivo subido como binario
        reader.readAsBinaryString(fileInput.files[0]);
    });
</script>
</body>
</html>
